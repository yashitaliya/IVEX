name: ivex
description: "IVEX - AI-Powered Men's Hairstyle Consulting App"
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  
  # Appwrite SDK for backend integration
  appwrite: 23.0.0
  
  # Image picker for camera/gallery access
  image_picker: ^1.0.7
  
  # State management
  provider: ^6.1.1
  
  # Premium typography
  google_fonts: ^6.1.0
  
  # Image caching
  cached_network_image: ^3.3.1
  
  # Loading animations
  shimmer: ^3.0.0
  
  # Lottie animations
  lottie: ^3.0.0

  # Local persisted preferences
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/logo.png
  min_sdk_android: 21
  adaptive_icon_background: "#111111"
  adaptive_icon_foreground: assets/images/logo.png
